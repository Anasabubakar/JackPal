services:
  - type: web
    name: jackpal-backend
    runtime: python
    region: frankfurt
    plan: free
    rootDir: backend
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: FRONTEND_URL
        value: https://jackpal.vercel.app
      - key: GROQ_API_KEY
        sync: false
